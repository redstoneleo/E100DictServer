##
# Gunicorn + Uvicorn upstream: 统一处理 HTTP 和 WebSocket
##
upstream django {
  server 127.0.0.1:8000;
}

# WebSocket upgrade helper
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
    # the domain name it will serve for
    server_name e600.feing.com.cn;
    listen 80;
    listen [::]:80;
    
    # Django media
    location /media {
        alias /home/ubuntu/E100DictServer/media;
    }

    location /static {
        alias /home/ubuntu/E100DictServer/static;
    }

    # 所有请求（包括 WebSocket）都转发到 Gunicorn + Uvicorn
    location / {
        proxy_pass http://django;
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置（WebSocket 需要长连接）
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 60;
        
        # 缓冲设置
        proxy_buffering off;
    }
}
